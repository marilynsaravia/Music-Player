<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel='stylesheet' href='https://use.fontawesome.com/releases/v5.3.1/css/all.css'><link rel="stylesheet" href="./style.css">
    <title>Pen</title>
  </head>
  <body>
    <h1 class="title">Music Player</h1>
    <div class="app">
      <div class="cover" id="picture"></div>
      <div class="track">
          <div class="track__title" id="title">With You</div>
        <div class="track__artist" id="artist">Chris Brown</div>
      </div>
      <div class="controls">
        <div class="button" id="backward-button">
          <i class="fas fa-step-backward"></i>
        </div>
        <div class="button" id="play-pause-button">
          <i class="fas fa-play"></i>
        </div>
        <div class="button" id="forward-button">
          <i class="fas fa-step-forward"></i>
        </div>
      </div>
    </div>
    <footer class="author">
      <small class="author__text">Developed by <a href="" class="author__name">Marilyn Saravia</a>.</small>
    </footer>
    
    <script src="./script.js"></script>
  </body>
</html>
